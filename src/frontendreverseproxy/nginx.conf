# Performance tuning for 100x traffic scaling
# At 100x: ~285,000 req/hr = ~79 req/sec through the proxy
worker_processes auto;
worker_rlimit_nofile 65536;

events {
  worker_connections 16384;
  multi_accept on;
  use epoll;
}

http {
  # Connection keep-alive to upstreams (reduces TCP handshake overhead)
  upstream backend_broker {
    server ${BROKER_SERVICE_URL_HOST};
    keepalive 64;
  }

  upstream backend_bitcoin {
    server ${BITCOIN_SERVICE_URL_HOST};
    keepalive 32;
  }

  # Buffers and timeouts tuned for high throughput
  proxy_buffer_size 16k;
  proxy_buffers 8 32k;
  proxy_busy_buffers_size 64k;
  proxy_connect_timeout 5s;
  proxy_send_timeout 30s;
  proxy_read_timeout 60s;

  # Enable gzip for API responses
  gzip on;
  gzip_types application/json application/xml text/plain;
  gzip_min_length 256;

  # Rate limiting zone (protect against thundering herd)
  limit_req_zone $binary_remote_addr zone=api_limit:20m rate=100r/s;

  log_format custom '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" [!dt dt.trace_id=$dt_trace_id,dt.span_id=$dt_span_id,dt.trace_sampled=$dt_trace_sampled]';
  access_log /dev/stdout custom;

  server {
    listen ${FRONTEND_REVERSE_PROXY_PORT};

    if ($dt_trace_id ~ "^$") {
      set $dt_trace_id "unknown";
    }
    if ($dt_span_id ~ "^$") {
      set $dt_span_id "unknown";
    }
    if ($dt_trace_sampled ~ "^$") {
      set $dt_trace_sampled "unknown";
    }

    location /loginservice {
      limit_req zone=api_limit burst=200 nodelay;
      rewrite /loginservice/(.*) /$1 break;
      proxy_pass ${LOGIN_SERVICE_URL};
      proxy_redirect off;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarder-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /loginservice;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    location /broker-service {
      limit_req zone=api_limit burst=500 nodelay;
      rewrite /broker-service/(.*) /$1 break;
      proxy_pass ${BROKER_SERVICE_URL};
      proxy_redirect off;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarder-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /broker-service;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    location /accountservice/api {
      rewrite /accountservice/(.*) /$1 break;
      proxy_pass ${ACCOUNT_SERVICE_URL};
      proxy_redirect off;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarder-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /accountservice/api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    location /accountservice {
      rewrite /accountservice/(.*) /$1 break;
      proxy_pass ${ACCOUNT_SERVICE_URL};
      proxy_redirect off;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
